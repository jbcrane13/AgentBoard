name: AgentBoard
options:
  bundleIdPrefix: com.agentboard
  deploymentTarget:
    macOS: "26.0"
    iOS: "26.0"
  xcodeVersion: "26.4"
  createIntermediateGroups: true
  defaultConfig: Debug

packages:
  Nuke:
    url: https://github.com/kean/Nuke
    from: 12.0.0
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: 1.10.0

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "26.0"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"

targets:
  AgentBoardCore:
    type: framework
    supportedDestinations: [macOS, iOS]
    sources:
      - path: AgentBoardCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentboard.AgentBoardCore
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"

  AgentBoardCompanionKit:
    type: framework
    platform: macOS
    sources:
      - path: AgentBoardCompanionKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentboard.AgentBoardCompanionKit
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
    dependencies:
      - target: AgentBoardCore

  AgentBoard:
    type: application
    platform: macOS
    info:
      path: AgentBoard/Info.plist
      properties:
        NSHumanReadableCopyright: "Copyright © 2026 Blake Crane. All rights reserved."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
    preBuildScripts:
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint lint
          else
            echo "warning: SwiftLint not installed — run: brew install swiftlint"
          fi
        name: SwiftLint
        inputFiles: []
        outputFiles: []
    sources:
      - path: AgentBoard
      - path: AgentBoardUI
    resources:
      - path: SharedResources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentboard.AgentBoard
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        ENABLE_APP_SANDBOX: NO
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: "32XZRDTGK3"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: "32XZRDTGK3"
    dependencies:
      - target: AgentBoardCore
      - package: Nuke
      - package: Nuke
        product: NukeUI
      - package: SwiftTerm

  AgentBoardMobile:
    type: application
    platform: iOS
    info:
      path: AgentBoardMobile/Info.plist
      properties:
        CFBundleDisplayName: AgentBoard
        NSHumanReadableCopyright: "Copyright © 2026 Blake Crane. All rights reserved."
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        UILaunchScreen: {}
        NSCameraUsageDescription: "AgentBoard uses the camera to take photos and attach them to chat messages."
        NSPhotoLibraryUsageDescription: "AgentBoard accesses your photo library to attach images to chat messages."
        NSMicrophoneUsageDescription: "AgentBoard uses the microphone to record voice messages."
        NSDocumentPickerUsageDescription: "AgentBoard accesses documents to attach files to chat messages."
    preBuildScripts:
      - script: |
          if which swiftlint > /dev/null; then
            swiftlint lint
          else
            echo "warning: SwiftLint not installed — run: brew install swiftlint"
          fi
        name: SwiftLint
        inputFiles: []
        outputFiles: []
    sources:
      - path: AgentBoardMobile
      - path: AgentBoardUI
    resources:
      - path: SharedResources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.agentboard.AgentBoardMobile
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: 1
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "6.0"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
        GENERATE_INFOPLIST_FILE: "NO"
        INFOPLIST_FILE: AgentBoardMobile/Info.plist
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: "32XZRDTGK3"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
          CODE_SIGN_IDENTITY: "Apple Development"
          DEVELOPMENT_TEAM: "32XZRDTGK3"
    dependencies:
      - target: AgentBoardCore
      - package: Nuke
      - package: Nuke
        product: NukeUI

  AgentBoardCompanion:
    type: tool
    platform: macOS
    sources:
      - path: AgentBoardCompanion
    settings:
      base:
        SWIFT_STRICT_CONCURRENCY: complete
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
    dependencies:
      - target: AgentBoardCompanionKit

  AgentBoardTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: AgentBoardTests
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
    dependencies:
      - target: AgentBoardCore
      - target: AgentBoardCompanionKit

schemes:
  AgentBoard:
    build:
      targets:
        AgentBoard: all
        AgentBoardTests: [test]
    test:
      gatherCoverageData: true
      coverageTargets:
        - AgentBoardCore
        - AgentBoardCompanionKit
      targets:
        - name: AgentBoardTests
          parallelizable: true
          randomExecutionOrder: true

  AgentBoardMobile:
    build:
      targets:
        AgentBoardMobile: all

  AgentBoardCompanion:
    build:
      targets:
        AgentBoardCompanion: all
